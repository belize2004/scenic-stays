<script>
        // Micro-interaction: Subtle slide-in effect for nav links on load
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('.nav-link');
            links.forEach((link, index) => {
                link.style.opacity = '0';
                link.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    link.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    link.style.opacity = '1';
                    link.style.transform = 'translateY(0)';
                }, 100 + (index * 80));
            });
        });

        // Simple Close Toggle Mockup
        const closeBtn = document.querySelector('button');
        closeBtn.addEventListener('click', () => {
            const overlay = document.getElementById('navigation-overlay');
            overlay.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
            overlay.style.opacity = '0';
            overlay.style.transform = 'scale(1.02)';
            setTimeout(() => {
                alert("Menu closed. (UI Prototype Only)");
                overlay.style.opacity = '1';
                overlay.style.transform = 'scale(1)';
            }, 500);
        });
    </script>
